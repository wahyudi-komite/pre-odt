<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE ONE DAY TURNAMENT KEP - Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/public.css">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><circle cx='16' cy='16' r='14' fill='%232ecc71'/><text x='16' y='22' font-size='18' text-anchor='middle' fill='white'>⚽</text></svg>">
</head>
<body class="public-page">
    <div id="app">
        <div class="loading-state" id="initial-loading">
            <div class="loading-spinner" style="width:36px;height:36px"></div>
            <p>Memuat data pertandingan...</p>
        </div>
    </div>

    <script type="module">
        import { APP_CONFIG } from "./js/config.js";
        import { supabase } from "./js/supabase-client.js";
        import {
            fetchTournament, fetchAreas, fetchAllTeams, fetchAllMatches
        } from "./js/data-service.js";
        import { subscribeAll, unsubscribeAll } from "./js/realtime-service.js";
        import { renderBracket } from "./js/bracket-engine.js";
        import {
            formatTimeWIB, escapeHtml
        } from "./js/utils.js";

        // --- State ---
        let tournament = null;
        let areas = [];
        let teams = [];
        let matches = [];
        let allMatches = {};
        let allTeams = {};
        let filterArea = "all";
        let filterStatus = "all";
        let searchQuery = "";
        let displayMode = false;
        let perspectiveMode = false;
        let lightMode = false;
        let focusArea = null;
        let lastUpdate = null;
        let connectionTimer = null;
        let refreshInProgress = false;

        const root = document.getElementById("app");

        try {
            lightMode = localStorage.getItem("pre-odt-theme") === "light";
        } catch (_) {
            lightMode = false;
        }
        document.body.classList.toggle("light-mode", lightMode);

        // --- Init ---
        async function init() {
            try {
                const allTournaments = await supabase
                    .from("tournaments")
                    .select("*")
                    .limit(1)
                    .single();

                if (allTournaments.error && allTournaments.error.code === 'PGRST116') {
                    tournament = await fetchTournament("pre-one-day-turnament-kep");
                } else if (allTournaments.data) {
                    tournament = allTournaments.data;
                } else {
                    tournament = await fetchTournament("pre-one-day-turnament-kep");
                }

                areas = await fetchAreas(tournament.id);
                const areaIds = areas.map(a => a.id);
                teams = await fetchAllTeams(areaIds);
                matches = await fetchAllMatches(areaIds);

                for (const t of teams) allTeams[t.id] = t;
                for (const m of matches) {
                    if (!allMatches[m.area_id]) allMatches[m.area_id] = [];
                    allMatches[m.area_id].push(m);
                }

                lastUpdate = new Date();
                renderFull();

                subscribeAll((table, payload) => {
                    handleRealtimeChange(table, payload);
                });

            } catch (err) {
                console.error(err);
                showError("Data gagal dimuat. Periksa koneksi lalu coba kembali.");
            }
        }

        function handleRealtimeChange(table, payload) {
            if (payload.eventType === "DELETE") {
                if (table === "matches" && payload.old) {
                    const m = payload.old;
                    matches = matches.filter(x => x.id !== m.id);
                    if (allMatches[m.area_id]) {
                        allMatches[m.area_id] = allMatches[m.area_id].filter(x => x.id !== m.id);
                    }
                }
                lastUpdate = new Date();
                renderFull();
                return;
            }

            if (table === "matches") {
                const m = payload.new;
                const flatIndex = matches.findIndex(x => x.id === m.id);
                if (flatIndex >= 0) matches[flatIndex] = m;
                else matches.push(m);
                if (m && allMatches[m.area_id]) {
                    const idx = allMatches[m.area_id].findIndex(x => x.id === m.id);
                    if (idx >= 0) {
                        allMatches[m.area_id][idx] = m;
                    } else {
                        allMatches[m.area_id].push(m);
                    }
                } else if (m) {
                    allMatches[m.area_id] = [m];
                }
                lastUpdate = new Date();
                updateMatchCard(m);
                renderChampions();
                renderStats();
                updateLastUpdate();
            } else if (table === "teams") {
                const t = payload.new;
                if (t) {
                    allTeams[t.id] = t;
                    const idx = teams.findIndex(x => x.id === t.id);
                    if (idx >= 0) teams[idx] = t;
                    else teams.push(t);
                }
                lastUpdate = new Date();
                renderFull();
                updateLastUpdate();
            }
        }

        function updateMatchCard(match) {
            if (!match || filterArea !== "all" && filterArea !== match.area_id) return;
            const section = document.querySelector(`.area-section[data-area-id="${match.area_id}"]`);
            if (section) {
                const oldContainer = section.querySelector(".bracket-svg-container, .empty-bracket");
                if (oldContainer) oldContainer.remove();
                renderBracketSection(match.area_id);
            }
        }

        function showError(msg) {
            root.innerHTML = `
                <div class="error-state">
                    <h3>Gagal Memuat Data</h3>
                    <p>${escapeHtml(msg)}</p>
                    <button class="btn btn-primary" onclick="location.reload()">Coba Lagi</button>
                </div>
            `;
        }

        function updateLastUpdate() {
            const el = document.getElementById("last-update");
            if (el) el.textContent = formatTimeWIB(lastUpdate);
        }

        // --- Render Full ---
        function renderFull() {
            root.innerHTML = `
                <header class="public-header">
                    <div class="public-header-top">
                        <div class="public-header-title public-brand">
                            <span class="brand-mark">KEP</span>
                            <div>
                                <div class="public-kicker">Live Tournament Control</div>
                                <h1>${escapeHtml(APP_CONFIG.eventName)}</h1>
                                <div class="public-subtitle">Bagan pertandingan futsal lintas area</div>
                            </div>
                        </div>
                        <div class="public-header-actions">
                            <span class="live-badge"><span class="live-pulse"></span> LIVE UPDATE</span>
                            <span class="connection-bar connection-live" id="conn-bar">
                                <span class="connection-dot"></span>
                                <span id="conn-text">Live</span>
                            </span>
                            <button class="btn btn-small btn-secondary" id="theme-button" onclick="window.toggleTheme()" title="Aktifkan light mode">LIGHT</button>
                            <button class="btn btn-small btn-secondary" id="perspective-button" onclick="window.togglePerspective()" title="Aktifkan perspektif 3D">3D <span class="btn-label">PERSPEKTIF</span></button>
                            <button class="btn btn-small btn-secondary" id="display-button" onclick="window.toggleDisplayMode()" title="Mode display">TV DISPLAY</button>
                            <button class="btn btn-small btn-secondary" onclick="window.toggleFullscreen()" title="Layar penuh">[ ]</button>
                            <button class="btn btn-small btn-secondary" onclick="window.refreshData()" title="Muat ulang">R</button>
                        </div>
                    </div>
                </header>

                <div class="monitor-toolbar">
                    <div class="stats-bar" id="stats-bar"></div>
                    <div class="filter-bar" id="filter-bar">
                        <select id="filter-area" onchange="window.applyFilter()">
                            <option value="all">Semua Area</option>
                            ${areas.map(a => `<option value="${a.id}">${escapeHtml(a.name)}</option>`).join("")}
                        </select>
                        <select id="filter-status" onchange="window.applyFilter()">
                            <option value="all">Semua Status</option>
                            <option value="not_started">Belum Dimulai</option>
                            <option value="live">Berlangsung</option>
                            <option value="finished">Selesai</option>
                        </select>
                        <input type="text" id="filter-search" placeholder="Cari nama tim..." oninput="window.applyFilter()">
                        <span id="last-update-label">Update: <span id="last-update">${formatTimeWIB(lastUpdate)}</span></span>
                    </div>
                </div>

                <div id="areas-container"></div>
                <div class="champions-section" id="champions-section"></div>
            `;

            renderStats();
            renderChampions();
            renderAllBrackets();
            updateThemeControl();
            updateDisplayControl();
            document.body.classList.toggle("view-3d", perspectiveMode);
            const perspectiveButton = document.getElementById("perspective-button");
            if (perspectiveButton) perspectiveButton.classList.toggle("is-active", perspectiveMode);
            document.getElementById("filter-area").value = filterArea;
            document.getElementById("filter-status").value = filterStatus;
            document.getElementById("filter-search").value = searchQuery;
            monitorConnection();
        }

        function renderStats() {
            const el = document.getElementById("stats-bar");
            if (!el) return;

            let totalFinished = 0;
            let totalLive = 0;
            let totalNotStarted = 0;

            for (const m of matches) {
                if (m.status === "finished") totalFinished++;
                else if (m.status === "live") totalLive++;
                else totalNotStarted++;
            }

            el.innerHTML = `
                <div class="stat-item">Total Area: <strong>${areas.length}</strong></div>
                <div class="stat-divider"></div>
                <div class="stat-item">Total Tim: <strong>${teams.length}</strong></div>
                <div class="stat-divider"></div>
                <div class="stat-item">Total Pertandingan: <strong>${matches.length}</strong></div>
                <div class="stat-divider"></div>
                <div class="stat-item">Selesai: <strong style="color:var(--color-success)">${totalFinished}</strong></div>
                <div class="stat-divider"></div>
                <div class="stat-item">Berlangsung: <strong style="color:var(--color-live)">${totalLive}</strong></div>
                <div class="stat-divider"></div>
                <div class="stat-item">Belum Dimulai: <strong style="color:var(--color-text-muted)">${totalNotStarted}</strong></div>
            `;
        }

        function renderChampions() {
            const el = document.getElementById("champions-section");
            if (!el) return;

            let rows = "";
            for (const area of areas) {
                const areaMatches = allMatches[area.id] || [];
                const finished = areaMatches.filter(m => m.status === "finished").length;
                const progress = Math.round((finished / 8) * 100);

                const finalMatch = areaMatches.find(m => m.match_code === "F");
                const tpMatch = areaMatches.find(m => m.match_code === "TP");

                const champ = finalMatch && finalMatch.winner_team_id ? allTeams[finalMatch.winner_team_id] : null;
                const runner = finalMatch && finalMatch.loser_team_id ? allTeams[finalMatch.loser_team_id] : null;
                const third = tpMatch && tpMatch.winner_team_id ? allTeams[tpMatch.winner_team_id] : null;

                rows += `
                    <tr>
                        <td><strong>${escapeHtml(area.name)}</strong></td>
                        <td class="${champ ? 'champion-gold' : ''}">${champ ? escapeHtml(champ.name) : 'Belum Ditentukan'}</td>
                        <td class="${runner ? 'champion-silver' : ''}">${runner ? escapeHtml(runner.name) : 'Belum Ditentukan'}</td>
                        <td class="${third ? 'champion-bronze' : ''}">${third ? escapeHtml(third.name) : 'Belum Ditentukan'}</td>
                        <td>
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
                            ${progress}%
                        </td>
                    </tr>
                `;
            }

            el.innerHTML = `
                <table class="champions-table">
                    <thead>
                        <tr>
                            <th>Area</th>
                            <th>Juara 1</th>
                            <th>Juara 2</th>
                            <th>Juara 3</th>
                            <th>Progress</th>
                        </tr>
                    </thead>
                    <tbody>${rows}</tbody>
                </table>
            `;
        }

        function renderAllBrackets() {
            const container = document.getElementById("areas-container");
            if (!container) return;

            let html = "";
            for (const [areaIndex, area] of areas.entries()) {
                if (filterArea !== "all" && filterArea !== area.id) continue;

                const areaMatches = allMatches[area.id] || [];
                const finished = areaMatches.filter(m => m.status === "finished").length;
                const progress = Math.round((finished / 8) * 100);

                html += `
                    <section class="area-section ${focusArea === area.id ? 'area-focused' : ''}" data-area-id="${area.id}" data-area-order="${areaIndex + 1}" style="--area-progress:${progress}%">
                        <div class="area-header">
                            <div class="area-title-group">
                                <span class="area-seed">${String(areaIndex + 1).padStart(2, "0")}</span>
                                <div>
                                    <div class="area-kicker">Arena Bracket</div>
                                    <h2>${escapeHtml(area.name)}</h2>
                                </div>
                            </div>
                            <span class="area-progress">${finished}/8 selesai - ${progress}%</span>
                        </div>
                    </section>
                `;
            }

            container.innerHTML = html;

            for (const area of areas) {
                if (filterArea !== "all" && filterArea !== area.id) continue;
                renderBracketSection(area.id);
            }
        }

        function renderBracketSection(areaId) {
            const section = document.querySelector(`.area-section[data-area-id="${areaId}"]`);
            if (!section) return;

            const areaTeams = teams.filter(t => t.area_id === areaId);
            const areaMatches = allMatches[areaId] || [];

            let filtered = areaMatches;
            if (filterStatus !== "all") {
                filtered = filtered.filter(m => m.status === filterStatus);
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                const matchedTeamIds = areaTeams.filter(t => t.name.toLowerCase().includes(q)).map(t => t.id);
                filtered = filtered.filter(m =>
                    (m.team1_id && matchedTeamIds.includes(m.team1_id)) ||
                    (m.team2_id && matchedTeamIds.includes(m.team2_id))
                );
            }

            const area = areas.find(a => a.id === areaId);
            if (area && filtered.length > 0) {
                const bracketEl = renderBracket(area, areaTeams, filtered);
                section.appendChild(bracketEl);
            } else if (area) {
                const empty = document.createElement("div");
                empty.className = "empty-bracket";
                empty.textContent = "Tidak ada pertandingan yang cocok dengan filter";
                section.appendChild(empty);
            }
        }

        // --- Global functions ---
        window.applyFilter = function() {
            filterArea = document.getElementById("filter-area").value;
            filterStatus = document.getElementById("filter-status").value;
            searchQuery = document.getElementById("filter-search").value;
            renderAllBrackets();
        };

        window.toggleDisplayMode = function() {
            displayMode = !displayMode;
            document.body.classList.toggle("display-mode", displayMode);
            if (displayMode) {
                if (!document.fullscreenElement) {
                    document.documentElement.requestFullscreen().catch(() => {});
                }
                promptFocusArea();
            } else {
                document.body.classList.remove("display-focus-area");
                focusArea = null;
                if (document.fullscreenElement) {
                    document.exitFullscreen().catch(() => {});
                }
            }
            updateDisplayControl();
            renderAllBrackets();
        };

        function updateDisplayControl() {
            const button = document.getElementById("display-button");
            if (!button) return;
            button.textContent = displayMode ? "KELUAR TV" : "TV DISPLAY";
            button.classList.toggle("is-active", displayMode);
            button.title = displayMode ? "Keluar dari mode TV" : "Aktifkan mode TV";
        }

        window.togglePerspective = function() {
            perspectiveMode = !perspectiveMode;
            document.body.classList.toggle("view-3d", perspectiveMode);
            const button = document.getElementById("perspective-button");
            if (button) {
                button.classList.toggle("is-active", perspectiveMode);
                button.title = perspectiveMode ? "Matikan perspektif 3D" : "Aktifkan perspektif 3D";
            }
            renderAllBrackets();
        };

        function updateThemeControl() {
            document.body.classList.toggle("light-mode", lightMode);
            const button = document.getElementById("theme-button");
            if (!button) return;
            button.textContent = lightMode ? "DARK" : "LIGHT";
            button.classList.toggle("is-active", lightMode);
            button.title = lightMode ? "Aktifkan dark mode" : "Aktifkan light mode";
        }

        window.toggleTheme = function() {
            lightMode = !lightMode;
            try {
                localStorage.setItem("pre-odt-theme", lightMode ? "light" : "dark");
            } catch (_) {
                // Theme still applies for this session when storage is unavailable.
            }
            updateThemeControl();
        };

        function promptFocusArea() {
            const div = document.createElement("div");
            div.className = "modal-overlay";
            div.id = "focus-modal";
            div.innerHTML = `
                <div class="modal-content">
                    <h2>Mode Display</h2>
                    <p>Pilih mode tampilan:</p>
                    <div style="display:flex;gap:8px;margin:16px 0">
                        <button class="btn btn-primary" onclick="window.setDisplayMode('all')" style="flex:1">Semua Area</button>
                        <button class="btn btn-secondary" onclick="window.setDisplayMode('focus')" style="flex:1">Fokus Area</button>
                    </div>
                    <div id="focus-area-picker" style="display:none">
                        <p style="margin-bottom:8px">Pilih area yang difokuskan:</p>
                        <div style="display:flex;flex-wrap:wrap;gap:6px">
                            ${areas.map(a => `<button class="btn btn-secondary btn-small" onclick="window.setFocusArea('${a.id}')">${escapeHtml(a.name)}</button>`).join("")}
                        </div>
                    </div>
                </div>
            `;
            document.body.appendChild(div);
        }

        window.setDisplayMode = function(mode) {
            if (mode === "focus") {
                document.getElementById("focus-area-picker").style.display = "block";
            } else {
                focusArea = null;
                document.body.classList.remove("display-focus-area");
                document.getElementById("focus-modal").remove();
            }
        };

        window.setFocusArea = function(areaId) {
            focusArea = areaId;
            document.body.classList.add("display-focus-area");
            renderAllBrackets();
            const modal = document.getElementById("focus-modal");
            if (modal) modal.remove();
        };

        window.toggleFullscreen = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => {});
            } else {
                document.exitFullscreen().catch(() => {});
            }
        };

        window.refreshData = async function() {
            if (refreshInProgress) return;
            refreshInProgress = true;
            try {
                const areaIds = areas.map(a => a.id);
                matches = await fetchAllMatches(areaIds);
                teams = await fetchAllTeams(areaIds);
                allTeams = {};
                allMatches = {};
                for (const t of teams) allTeams[t.id] = t;
                for (const m of matches) {
                    if (!allMatches[m.area_id]) allMatches[m.area_id] = [];
                    allMatches[m.area_id].push(m);
                }
                lastUpdate = new Date();
                renderStats();
                renderChampions();
                renderAllBrackets();
                updateLastUpdate();
            } catch (err) {
                console.error(err);
                showToast("Data gagal dimuat ulang.", "error");
            } finally {
                refreshInProgress = false;
            }
        };

        // --- Toast ---
        function showToast(msg, type = "info") {
            const existing = document.querySelector(".toast-container");
            if (!existing) {
                const tc = document.createElement("div");
                tc.className = "toast-container";
                document.body.appendChild(tc);
            }
            const t = document.createElement("div");
            t.className = "toast toast-" + type;
            t.textContent = msg;
            document.querySelector(".toast-container").appendChild(t);
            setTimeout(() => {
                t.classList.add("toast-out");
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // --- Connection monitoring ---
        function monitorConnection() {
            function updateConnectionState() {
                const bar = document.getElementById("conn-bar");
                const text = document.getElementById("conn-text");
                if (!bar || !text) return;
                const channels = supabase.getChannels();
                const hasSub = channels.some(c => c.state === "subscribed");
                if (hasSub) {
                    bar.className = "connection-bar connection-live";
                    text.textContent = "Live";
                } else {
                    const hasAny = channels.some(c => c.state === "joining" || c.state === "joined");
                    if (hasAny) {
                        bar.className = "connection-bar connection-connecting";
                        text.textContent = "Menghubungkan";
                    } else {
                        bar.className = "connection-bar connection-offline";
                        text.textContent = "Offline";
                    }
                }
            }

            updateConnectionState();
            if (!connectionTimer) {
                connectionTimer = setInterval(updateConnectionState, 5000);
            }
        }

        init();

        setInterval(() => {
            if (displayMode) {
                window.refreshData();
                return;
            }
            const connText = document.getElementById("conn-text");
            if (connText && connText.textContent === "Offline") {
                window.refreshData();
            }
        }, 60000);

        let resizeTimer = null;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(renderAllBrackets, 160);
        });

        window.addEventListener("beforeunload", () => {
            unsubscribeAll();
        });
    </script>
</body>
</html>
