<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRE ONE DAY TURNAMENT KEP - Monitoring</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800&family=Manrope:wght@400;500;600;700;800&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="./css/base.css">
    <link rel="stylesheet" href="./css/public.css">
    <link rel="icon" type="image/png" href="./assets/odt-logo.png">
</head>

<body class="public-page">
    <div id="app">
        <div class="loading-state" id="initial-loading">
            <div class="loading-spinner" style="width:36px;height:36px"></div>
            <p>Memuat data pertandingan...</p>
        </div>
    </div>

    <script type="module">
        import { APP_CONFIG } from "./js/config.js";
        import { supabase } from "./js/supabase-client.js";
        import {
            fetchTournament, fetchAreas, fetchAllTeams, fetchAllMatches
        } from "./js/data-service.js";
        import { subscribeAll, unsubscribeAll } from "./js/realtime-service.js";
        import { renderBracket } from "./js/bracket-engine.js";
        import {
            formatTimeWIB, escapeHtml
        } from "./js/utils.js";
        import {
            readFullscreenArea,
            saveFullscreenArea,
            clearFullscreenArea,
            resolveFullscreenArea
        } from "./js/fullscreen-area-state.js";

        // --- State ---
        let tournament = null;
        let areas = [];
        let teams = [];
        let matches = [];
        let allMatches = {};
        let allTeams = {};
        let filterArea = "all";
        let filterStatus = "all";
        let searchQuery = "";
        let perspectiveMode = false;
        let lightMode = false;
        let lastUpdate = null;
        let connectionTimer = null;
        let refreshInProgress = false;
        let fullscreenAreaId = null;

        const root = document.getElementById("app");

        try {
            lightMode = localStorage.getItem("pre-odt-theme") === "light";
        } catch (_) {
            lightMode = false;
        }
        document.body.classList.toggle("light-mode", lightMode);

        // --- Init ---
        async function init() {
            try {
                const allTournaments = await supabase
                    .from("tournaments")
                    .select("*")
                    .limit(1)
                    .single();

                if (allTournaments.error && allTournaments.error.code === 'PGRST116') {
                    tournament = await fetchTournament("pre-one-day-turnament-kep");
                } else if (allTournaments.data) {
                    tournament = allTournaments.data;
                } else {
                    tournament = await fetchTournament("pre-one-day-turnament-kep");
                }

                areas = (await fetchAreas(tournament.id)).map(area =>
                    area.area_number === 1 ? { ...area, name: "FUTSAL" } : area
                );
                const areaIds = areas.map(a => a.id);
                teams = await fetchAllTeams(areaIds);
                matches = await fetchAllMatches(areaIds);

                for (const t of teams) allTeams[t.id] = t;
                for (const m of matches) {
                    if (!allMatches[m.area_id]) allMatches[m.area_id] = [];
                    allMatches[m.area_id].push(m);
                }

                lastUpdate = new Date();
                renderFull();

                subscribeAll((table, payload) => {
                    handleRealtimeChange(table, payload);
                });

            } catch (err) {
                console.error(err);
                showError("Data gagal dimuat. Periksa koneksi lalu coba kembali.");
            }
        }

        function handleRealtimeChange(table, payload) {
            if (payload.eventType === "DELETE") {
                if (table === "matches" && payload.old) {
                    const m = payload.old;
                    matches = matches.filter(x => x.id !== m.id);
                    if (allMatches[m.area_id]) {
                        allMatches[m.area_id] = allMatches[m.area_id].filter(x => x.id !== m.id);
                    }
                }
                lastUpdate = new Date();
                renderFull();
                return;
            }

            if (table === "matches") {
                const m = payload.new;
                const flatIndex = matches.findIndex(x => x.id === m.id);
                if (flatIndex >= 0) matches[flatIndex] = m;
                else matches.push(m);
                if (m && allMatches[m.area_id]) {
                    const idx = allMatches[m.area_id].findIndex(x => x.id === m.id);
                    if (idx >= 0) {
                        allMatches[m.area_id][idx] = m;
                    } else {
                        allMatches[m.area_id].push(m);
                    }
                } else if (m) {
                    allMatches[m.area_id] = [m];
                }
                lastUpdate = new Date();
                updateMatchCard(m);
                renderChampions();
                updateLastUpdate();
            } else if (table === "teams") {
                const t = payload.new;
                if (t) {
                    allTeams[t.id] = t;
                    const idx = teams.findIndex(x => x.id === t.id);
                    if (idx >= 0) teams[idx] = t;
                    else teams.push(t);
                }
                lastUpdate = new Date();
                const fullscreenArea = document.fullscreenElement?.classList.contains("area-section")
                    ? document.fullscreenElement
                    : null;
                if (fullscreenArea) redrawAreaBracket(fullscreenArea.dataset.areaId);
                else renderFull();
                updateLastUpdate();
            }
        }

        function updateMatchCard(match) {
            if (!match || filterArea !== "all" && filterArea !== match.area_id) return;
            redrawAreaBracket(match.area_id);
        }

        function redrawAreaBracket(areaId) {
            const section = document.querySelector(`.area-section[data-area-id="${areaId}"]`);
            if (!section) return;

            const oldContainer = section.querySelector(".bracket-svg-container, .empty-bracket");
            if (oldContainer) oldContainer.remove();
            renderBracketSection(areaId);
        }

        function showError(msg) {
            root.innerHTML = `
                <div class="error-state">
                    <h3>Gagal Memuat Data</h3>
                    <p>${escapeHtml(msg)}</p>
                    <button class="btn btn-primary" onclick="location.reload()">Coba Lagi</button>
                </div>
            `;
        }

        function updateLastUpdate() {
            const el = document.getElementById("last-update");
            if (el) el.textContent = formatTimeWIB(lastUpdate);
        }

        // --- Render Full ---
        function renderFull() {
            root.innerHTML = `
                <header class="public-header">
                    <div class="public-header-top">
                        <div class="public-header-title public-brand">
                            <span class="brand-mark">KEP</span>
                            <div>
                                <div class="public-kicker">Live Tournament Control</div>
                                <h1>${escapeHtml(APP_CONFIG.eventName)}</h1>
                            </div>
                        </div>
                        <div class="public-header-actions">
                            <span class="live-badge"><span class="live-pulse"></span> LIVE UPDATE</span>
                            <span class="connection-bar connection-live" id="conn-bar">
                                <span class="connection-dot"></span>
                                <span id="conn-text">Live</span>
                            </span>
                            <span id="last-update-label">Update: <span id="last-update">${formatTimeWIB(lastUpdate)}</span></span>
                            <button class="btn btn-small btn-secondary" id="theme-button" onclick="window.toggleTheme()" title="Aktifkan light mode">LIGHT</button>
                            <button class="btn btn-small btn-secondary" onclick="window.toggleFullscreen()" title="Layar penuh">[ ]</button>
                            <button class="btn btn-small btn-secondary" onclick="window.refreshData()" title="Muat ulang">R</button>
                        </div>
                    </div>
                </header>

                <div id="areas-container"></div>
            `;

            renderAllBrackets();
            renderChampions();
            updateThemeControl();
            document.body.classList.toggle("view-3d", perspectiveMode);
            const perspectiveButton = document.getElementById("perspective-button");
            if (perspectiveButton) perspectiveButton.classList.toggle("is-active", perspectiveMode);

            monitorConnection();
        }

        function renderChampions() {
            const el = document.getElementById("champions-section");
            if (!el) return;

            const totalFinished = matches.filter(m => m.status === "finished").length;
            const totalLive = matches.filter(m => m.status === "live").length;
            const totalNotStarted = matches.length - totalFinished - totalLive;

            let rows = "";
            for (const area of areas) {
                const areaMatches = allMatches[area.id] || [];
                const finished = areaMatches.filter(m => m.status === "finished").length;
                const progress = Math.round((finished / 8) * 100);

                const finalMatch = areaMatches.find(m => m.match_code === "F");
                const tpMatch = areaMatches.find(m => m.match_code === "TP");

                const champ = finalMatch && finalMatch.winner_team_id ? allTeams[finalMatch.winner_team_id] : null;
                const runner = finalMatch && finalMatch.loser_team_id ? allTeams[finalMatch.loser_team_id] : null;
                const third = tpMatch && tpMatch.winner_team_id ? allTeams[tpMatch.winner_team_id] : null;

                rows += `
                    <tr>
                        <td><strong>${escapeHtml(area.name)}</strong></td>
                        <td class="${champ ? 'champion-gold' : ''}">${champ ? escapeHtml(champ.name) : 'Belum Ditentukan'}</td>
                        <td class="${runner ? 'champion-silver' : ''}">${runner ? escapeHtml(runner.name) : 'Belum Ditentukan'}</td>
                        <td class="${third ? 'champion-bronze' : ''}">${third ? escapeHtml(third.name) : 'Belum Ditentukan'}</td>
                        <td>
                            <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${progress}%"></div></div>
                            ${progress}%
                        </td>
                    </tr>
                `;
            }

            el.innerHTML = `
                <div class="summary-stats-grid">
                    <div class="summary-stat-card">
                        <span class="summary-stat-label">Total Area</span>
                        <strong class="summary-stat-value">${areas.length}</strong>
                    </div>
                    <div class="summary-stat-card">
                        <span class="summary-stat-label">Total Tim</span>
                        <strong class="summary-stat-value">${teams.length}</strong>
                    </div>
                    <div class="summary-stat-card">
                        <span class="summary-stat-label">Total Pertandingan</span>
                        <strong class="summary-stat-value">${matches.length}</strong>
                    </div>
                    <div class="summary-stat-card summary-stat-finished">
                        <span class="summary-stat-label">Selesai</span>
                        <strong class="summary-stat-value">${totalFinished}</strong>
                    </div>
                    <div class="summary-stat-card summary-stat-live">
                        <span class="summary-stat-label">Berlangsung</span>
                        <strong class="summary-stat-value">${totalLive}</strong>
                    </div>
                    <div class="summary-stat-card summary-stat-pending">
                        <span class="summary-stat-label">Belum Dimulai</span>
                        <strong class="summary-stat-value">${totalNotStarted}</strong>
                    </div>
                </div>
                <div class="summary-table-panel">
                    <table class="champions-table">
                        <thead>
                            <tr>
                                <th>Area</th>
                                <th>Juara 1</th>
                                <th>Juara 2</th>
                                <th>Juara 3</th>
                                <th>Progress</th>
                            </tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>
            `;
        }

        function renderAllBrackets() {
            const container = document.getElementById("areas-container");
            if (!container) return;

            let html = "";
            let visibleCount = 0;
            for (const [areaIndex, area] of areas.entries()) {
                if (filterArea !== "all" && filterArea !== area.id) continue;

                visibleCount++;
                const areaMatches = allMatches[area.id] || [];
                const finished = areaMatches.filter(m => m.status === "finished").length;
                const progress = Math.round((finished / 8) * 100);

                html += `
                    <section class="area-section" data-area-id="${area.id}" data-area-order="${areaIndex + 1}" style="--area-progress:${progress}%">
                        <div class="area-header">
                            <div class="area-title-group">
                                <span class="area-seed">${String(areaIndex + 1).padStart(2, "0")}</span>
                                <div>
                                    <h2>${escapeHtml(area.name)}</h2>
                                </div>
                            </div>
                            <div class="area-header-actions">
                                <span class="area-progress">${finished}/8 selesai - ${progress}%</span>
                                <button type="button" class="area-fullscreen-btn" onclick="window.handleAreaFullscreen('${area.id}')" title="Fullscreen ${escapeHtml(area.name)}" aria-label="Fullscreen ${escapeHtml(area.name)}">
                                    <span class="area-fullscreen-open">FULL</span>
                                    <span class="area-fullscreen-close">EXIT</span>
                                </button>
                            </div>
                        </div>
                    </section>
                `;
            }

            if (filterArea === "all" && visibleCount > 0) {
                html += `
                    <section class="champions-section area-summary-panel" id="champions-section"></section>
                    <section class="odt-logo-panel" id="odt-logo-panel">
                        <div class="odt-logo-card">
                            <img src="./assets/odt-logo.png" alt="One Daihatsu Tournament Logo" class="odt-logo-img" />
                            <div class="odt-logo-title">ONE DAIHATSU TOURNAMENT</div>
                        </div>
                    </section>
                `;
            }

            container.innerHTML = html;

            for (const area of areas) {
                if (filterArea !== "all" && filterArea !== area.id) continue;
                renderBracketSection(area.id);
            }

            renderChampions();
            restoreFullscreenArea();
        }

        function renderBracketSection(areaId) {
            const section = document.querySelector(`.area-section[data-area-id="${areaId}"]`);
            if (!section) return;

            const areaTeams = teams.filter(t => t.area_id === areaId);
            const areaMatches = allMatches[areaId] || [];

            let filtered = areaMatches;
            if (filterStatus !== "all") {
                filtered = filtered.filter(m => m.status === filterStatus);
            }
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                const matchedTeamIds = areaTeams.filter(t => t.name.toLowerCase().includes(q)).map(t => t.id);
                filtered = filtered.filter(m =>
                    (m.team1_id && matchedTeamIds.includes(m.team1_id)) ||
                    (m.team2_id && matchedTeamIds.includes(m.team2_id))
                );
            }

            const area = areas.find(a => a.id === areaId);
            if (area && filtered.length > 0) {
                const bracketEl = renderBracket(area, areaTeams, filtered);
                section.appendChild(bracketEl);
            } else if (area) {
                const empty = document.createElement("div");
                empty.className = "empty-bracket";
                empty.textContent = "Tidak ada pertandingan yang cocok dengan filter";
                section.appendChild(empty);
            }
        }

        // --- Global functions ---

        window.togglePerspective = function () {
            perspectiveMode = !perspectiveMode;
            document.body.classList.toggle("view-3d", perspectiveMode);
            const button = document.getElementById("perspective-button");
            if (button) {
                button.classList.toggle("is-active", perspectiveMode);
                button.title = perspectiveMode ? "Matikan perspektif 3D" : "Aktifkan perspektif 3D";
            }
            renderAllBrackets();
        };

        function updateThemeControl() {
            document.body.classList.toggle("light-mode", lightMode);
            const button = document.getElementById("theme-button");
            if (!button) return;
            button.textContent = lightMode ? "DARK" : "LIGHT";
            button.classList.toggle("is-active", lightMode);
            button.title = lightMode ? "Aktifkan dark mode" : "Aktifkan light mode";
        }

        window.toggleTheme = function () {
            lightMode = !lightMode;
            try {
                localStorage.setItem("pre-odt-theme", lightMode ? "light" : "dark");
            } catch (_) {
                // Theme still applies for this session when storage is unavailable.
            }
            updateThemeControl();
        };

        function restoreFullscreenArea() {
            const savedAreaId = readFullscreenArea(localStorage);
            const validAreaId = resolveFullscreenArea(savedAreaId, areas.map(area => area.id));

            if (!validAreaId) {
                if (savedAreaId) clearFullscreenArea(localStorage);
                return;
            }

            const section = document.querySelector(`.area-section[data-area-id="${validAreaId}"]`);
            if (!section) {
                clearFullscreenArea(localStorage);
                return;
            }

            document.body.classList.add("area-fullscreen-restored-mode");
            document.querySelectorAll(".area-section").forEach(candidate => {
                candidate.classList.toggle("area-hidden", candidate.dataset.areaId !== validAreaId);
            });
            section.classList.add("area-fullscreen-restored");
            fullscreenAreaId = validAreaId;
            requestAnimationFrame(() => redrawAreaBracket(validAreaId));
        }

        window.toggleFullscreen = function () {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(() => { });
            } else {
                document.exitFullscreen().catch(() => { });
            }
        };

        window.exitAreaFullscreen = async function () {
            const areaId = fullscreenAreaId || readFullscreenArea(localStorage);

            if (document.fullscreenElement) {
                await document.exitFullscreen().catch(() => { });
            }

            clearFullscreenArea(localStorage);
            fullscreenAreaId = null;
            document.body.classList.remove("area-fullscreen-restored-mode");
            document.querySelectorAll(".area-section").forEach(section => {
                section.classList.remove("area-hidden", "area-fullscreen-restored");
            });
            renderAllBrackets();

            if (areaId) requestAnimationFrame(() => redrawAreaBracket(areaId));
        };

        window.handleAreaFullscreen = async function (areaId) {
            const section = document.querySelector(`.area-section[data-area-id="${areaId}"]`);
            if (!section) return;

            const isSelected = fullscreenAreaId === areaId
                || section.classList.contains("area-fullscreen-restored")
                || document.fullscreenElement === section;

            if (isSelected) {
                await window.exitAreaFullscreen();
                return;
            }

            fullscreenAreaId = areaId;
            saveFullscreenArea(localStorage, areaId);

            try {
                if (document.fullscreenElement) await document.exitFullscreen();
                await section.requestFullscreen();
            } catch (err) {
                document.body.classList.add("area-fullscreen-restored-mode");
                restoreFullscreenArea();
                console.error(err);
                showToast("Fullscreen browser tidak dapat diaktifkan. Area tetap difokuskan.", "warning");
            }
        };

        document.addEventListener("fullscreenchange", () => {
            const activeArea = document.fullscreenElement?.classList.contains("area-section")
                ? document.fullscreenElement
                : null;
            const areaId = activeArea?.dataset.areaId || fullscreenAreaId || readFullscreenArea(localStorage);

            if (activeArea) {
                fullscreenAreaId = activeArea.dataset.areaId;
                requestAnimationFrame(() => redrawAreaBracket(fullscreenAreaId));
            } else if (areaId) {
                restoreFullscreenArea();
            }
        });

        window.refreshData = async function () {
            if (refreshInProgress) return;
            refreshInProgress = true;
            try {
                const areaIds = areas.map(a => a.id);
                matches = await fetchAllMatches(areaIds);
                teams = await fetchAllTeams(areaIds);
                allTeams = {};
                allMatches = {};
                for (const t of teams) allTeams[t.id] = t;
                for (const m of matches) {
                    if (!allMatches[m.area_id]) allMatches[m.area_id] = [];
                    allMatches[m.area_id].push(m);
                }
                lastUpdate = new Date();
                const fullscreenArea = document.fullscreenElement?.classList.contains("area-section")
                    ? document.fullscreenElement
                    : null;
                if (fullscreenArea) {
                    redrawAreaBracket(fullscreenArea.dataset.areaId);
                } else {
                    renderChampions();
                    renderAllBrackets();
                }
                updateLastUpdate();
            } catch (err) {
                console.error(err);
                showToast("Data gagal dimuat ulang.", "error");
            } finally {
                refreshInProgress = false;
            }
        };

        // --- Toast ---
        function showToast(msg, type = "info") {
            const existing = document.querySelector(".toast-container");
            if (!existing) {
                const tc = document.createElement("div");
                tc.className = "toast-container";
                document.body.appendChild(tc);
            }
            const t = document.createElement("div");
            t.className = "toast toast-" + type;
            t.textContent = msg;
            document.querySelector(".toast-container").appendChild(t);
            setTimeout(() => {
                t.classList.add("toast-out");
                setTimeout(() => t.remove(), 300);
            }, 3000);
        }

        // --- Connection monitoring ---
        function monitorConnection() {
            function updateConnectionState() {
                const bar = document.getElementById("conn-bar");
                const text = document.getElementById("conn-text");
                if (!bar || !text) return;
                const channels = supabase.getChannels();
                const hasSub = channels.some(c => c.state === "subscribed");
                if (hasSub) {
                    bar.className = "connection-bar connection-live";
                    text.textContent = "Live";
                } else {
                    const hasAny = channels.some(c => c.state === "joining" || c.state === "joined");
                    if (hasAny) {
                        bar.className = "connection-bar connection-connecting";
                        text.textContent = "Menghubungkan";
                    } else {
                        bar.className = "connection-bar connection-offline";
                        text.textContent = "Offline";
                    }
                }
            }

            updateConnectionState();
            if (!connectionTimer) {
                connectionTimer = setInterval(updateConnectionState, 5000);
            }
        }

        init();

        setInterval(() => {
            const connText = document.getElementById("conn-text");
            if (connText && connText.textContent === "Offline") {
                window.refreshData();
            }
        }, 60000);

        let resizeTimer = null;
        window.addEventListener("resize", () => {
            clearTimeout(resizeTimer);
            resizeTimer = setTimeout(() => {
                const fullscreenArea = document.fullscreenElement?.classList.contains("area-section")
                    ? document.fullscreenElement
                    : null;
                if (fullscreenArea) redrawAreaBracket(fullscreenArea.dataset.areaId);
                else renderAllBrackets();
            }, 160);
        });

        window.addEventListener("beforeunload", () => {
            unsubscribeAll();
        });
    </script>
</body>

</html>
